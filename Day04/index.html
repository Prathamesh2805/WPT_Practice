<html>
  <head>
    <title>Demo</title>
  </head>
  <body>
    <center>
      <h1>Registration</h1>

      <table style="width: 500px; text-align: center">
        <tr>
          <td>
            <label for="name">Name: </label>
            <input type="text" id="name" />
          </td>
          <td>
            <p id="errorName" style="color: red"></p>
          </td>
        </tr>
        <tr>
          <td>
            <label for="Number">Number: </label>
            <input type="number" id="number" />
          </td>
          <td>
            <p id="errorNumber" style="color: red"></p>
          </td>
        </tr>
        <tr>
          <td>
            <label for="address">Address: </label>
            <input type="text" id="address" />
          </td>
          <td>
            <p id="errorAddress" style="color: red"></p>
          </td>
        </tr>

        <tr>
          <td colspan="2">
            <label for="submit"></label>
            <input
              style="padding-left: 30px; padding-right: 30px"
              type="button"
              id="registerBtn"
              value="Register Now"
              onclick="validate()"
            />
          </td>
        </tr>
      </table>
      <p id="myPara"></p>
    </center>
    <script src="index.js"></script>
    <script>
      function validate() {
        var refToMyPara = document.getElementById("myPara");
        refToMyPara.innerText = "";

        var validateName =
          validateBlank("name", "errorName", "Name is required") &&
          validateLength(
            "name",
            "errorName",
            "Name length should be between 3-20",
          );

        var isEmptyNumber = validateBlank(
          "number",
          "errorNumber",
          "Number is required",
        );
        var isEmptyAddress = validateBlank(
          "address",
          "errorAddress",
          "Address is required",
        );


        if (validateName && isEmptyNumber && isEmptyAddress) {
        }
      }
    </script>
  </body>
</html>
