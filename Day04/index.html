<html>
  <head>
    <title>Demo</title>
  </head>
  <body>
    <center>
      <h1>Registration</h1>
    </center>
    <center>
      <table style="width: 500px; text-align: center">
        <tr>
          <td>
            <label for="name">Name: </label>
            <input type="text" id="name" />
          </td>
          <td>
            <p id="errorName" style="color: red"></p>
          </td>
        </tr>
        <tr>
          <td>
            <label for="Number">Number: </label>
            <input type="number" id="number" />
          </td>
          <td>
            <p id="errorNumber" style="color: red"></p>
          </td>
        </tr>
        <tr>
          <td>
            <label for="address">Address: </label>
            <input type="text" id="address" />
          </td>
          <td>
            <p id="errorAddress" style="color: red"></p>
          </td>
        </tr>

        <tr>
          <td colspan="2">
            <label for="submit"></label>
            <input
              type="button"
              id="registerBtn"
              value="Register Now"
              onclick="validate()"
            />
          </td>
        </tr>
      </table>
      <p id="myPara"></p>
    </center>
    <script src="index.js"></script>
    <script>
      function validate() {
        var refToMyPara = document.getElementById("myPara");
        refToMyPara.innerText = "";

        validateBlank("name", "errorName", "Name is required");
        validateBlank("number", "errorNumber", "Number is required");
        validateBlank("address", "errorAddress", "Address is required");


      }
    </script>
  </body>
</html>
