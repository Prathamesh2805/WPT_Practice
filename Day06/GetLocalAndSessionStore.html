<!doctype html>
<html lang="en">
  <head>
    <title>Document</title>
  </head>
  <body>
    <h1>Session Store</h1>
    <label for="name">Name</label>
    <input type="text" id="name" value="" />
    <br />
    <label for="Address">Address</label>
    <input type="text" id="address" value="" />

    <br />
    <input
      type="button"
      id="btn"
      value="Click to retrive data from session store"
      onclick="sessionStore()"
    />
    <input
      type="button"
      id="btn"
      value="Click to retrive data from local store"
      onclick="localStore()"
    />
<br>
    <a href="SetLocalAndSessionStore.html">CLick to set data</a>

    <script>
      function sessionStore() {
        var refToName = document.getElementById("name");
        var refToAddress = document.getElementById("address");

        sessionStorage.getItem(name);
        sessionStorage.getItem(address);

        refToName.value = sessionStorage.getItem(name);
        refToAddress.value = sessionStorage.getItem(address);

      }
      function localStore() {
        var refToName = document.getElementById("name");
        var refToAddress = document.getElementById("address");

        localStorage.getItem(name);
        localStorage.getItem(address);

        refToName.value = localStorage.getItem(name);
        refToAddress.value = localStorage.getItem(address);

      }
    </script>
  </body>
</html>
