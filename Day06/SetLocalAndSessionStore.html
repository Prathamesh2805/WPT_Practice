<!doctype html>
<html lang="en">
  <head>
    <title>Document</title>
  </head>
  <body>
    <h1>Session Store</h1>
    <label for="name">Name</label>
    <input type="text" id="name" value="" />
    <br />
    <label for="Address">Address</label>
    <input type="text" id="address" value="" />

    <br />
    <input
      type="button"
      id="btn"
      value="Click to store data in session store"
      onclick="sessionStore()"
    />
    <input
      type="button"
      id="btn"
      value="Click to store data in local store"
      onclick="localStore()"
    />
    <br>

    <a href="GetLocalAndSessionStore.html">Click to get data</a>

    <script>
      function sessionStore() {
        var refToName = document.getElementById("name");
        var refToAddress = document.getElementById("address");

        var name = refToName.value;
        var address = refToAddress.value;
        sessionStorage.setItem("name", name);
        sessionStorage.setItem("address", address);
      }
      function localStore() {
        var refToName = document.getElementById("name");
        var refToAddress = document.getElementById("address");

        var name = refToName.value;
        var address = refToAddress.value;
        localStorage.setItem("name", name);
        localStorage.setItem("address", address);
      }
    </script>
  </body>
</html>
